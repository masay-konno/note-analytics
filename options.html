<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #1c1c1e;
            padding: 24px;
            min-width: 400px;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #1c1c1e; color: #f5f5f7; }
            input { background: #3a3a3c; color: #f5f5f7; border-color: #555; }
        }
        h2 { font-size: 18px; margin-bottom: 16px; }
        label { display: block; font-size: 13px; color: #8e8e93; margin-bottom: 4px; }
        input {
            width: 100%; padding: 8px 12px; border: 1px solid #e5e5ea;
            border-radius: 8px; font-size: 14px; margin-bottom: 12px;
        }
        .hint { font-size: 11px; color: #8e8e93; margin-bottom: 16px; }
        button {
            background: #d97706; color: #fff; border: none;
            padding: 8px 24px; border-radius: 8px; font-size: 14px; cursor: pointer;
        }
        button:hover { background: #b45309; }
        .status { font-size: 12px; color: #22c55e; margin-top: 8px; display: none; }
    </style>
</head>
<body>
    <h2>note Analytics 設定</h2>
    <label for="urlname">note.com クリエイターID</label>
    <input type="text" id="urlname" placeholder="例: your_id">
    <div class="hint">note.com/<b>ここの部分</b> を入力してください</div>
    <button id="btnSave">保存</button>
    <div class="status" id="status">保存しました</div>

    <script src="options.js"></script>
</body>
</html>
