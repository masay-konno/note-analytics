<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: -apple-system, sans-serif; padding: 24px; background: #1c1c1e; color: #f5f5f7; }
        button { background: #d97706; color: #fff; border: none; padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; }
        #status { margin-top: 16px; font-size: 13px; }
    </style>
</head>
<body>
    <h2>CSVデータをインポート</h2>
    <p>Cockpitの既存データをChrome拡張にインポートします。</p>
    <button id="btnImport">インポート実行</button>
    <div id="status"></div>
    <script>
    document.getElementById('btnImport').addEventListener('click', async function() {
        var status = document.getElementById('status');
        status.textContent = '読み込み中...';
        try {
            var res = await fetch(chrome.runtime.getURL('import_data.json'));
            var snapshots = await res.json();
            var dates = Object.keys(snapshots).sort();
            await chrome.storage.local.set({ snapshots: snapshots, lastFetched: dates[dates.length - 1] });
            status.textContent = 'インポート完了: ' + dates.length + '日分 (' + dates[0] + ' ~ ' + dates[dates.length - 1] + ')';
        } catch(e) {
            status.textContent = 'エラー: ' + e.message;
        }
    });
    </script>
</body>
</html>
